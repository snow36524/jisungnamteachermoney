name: 법원 공고 자동 크롤링

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 (KST = UTC+9, so UTC 00:00)
  workflow_dispatch:       # 수동 실행 버튼도 제공

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 크롤링 실행
        run: python crawl_only.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scourt_data.json scourt_viewer.html
          git diff --staged --quiet || git commit -m "자동 크롤링: $(date '+%Y-%m-%d %H:%M') KST"
          git push
